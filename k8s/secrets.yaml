apiVersion: v1
kind: Secret
metadata:
  name: baili-secrets
  namespace: baili-education
type: Opaque
stringData:
  MONGODB_URI: mongodb://mongo-service:27017/baili_education
  JWT_SECRET: "change-this-to-a-secure-random-string-in-production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: baili-config
  namespace: baili-education
data:
  NODE_ENV: "production"
  PORT: "3000"
  CORS_ORIGIN: "https://your-frontend-domain.com"
  MONGO_POOL_SIZE: "10"
  RATE_LIMIT_MAX_REQUESTS: "100"
